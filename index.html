<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tech-notes スライド一覧</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    header {
      padding: 24px 16px 16px;
      border-bottom: 1px solid #1e293b;
    }
    header h1 { font-size: 20px; font-weight: 700; color: #f8fafc; }
    header p { font-size: 13px; color: #64748b; margin-top: 4px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      padding: 16px;
    }
    .course-card {
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      color: inherit;
      text-decoration: none;
      display: block;
      transition: background 0.15s;
    }
    .course-card:hover { background: #263548; }
    .course-card-body {
      padding: 20px 16px 16px;
    }
    .course-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(79,143,255,0.2);
      color: #4F8FFF;
      margin-bottom: 10px;
    }
    .course-title {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      line-height: 1.4;
    }
    .course-meta {
      font-size: 11px;
      color: #64748b;
      margin-top: 6px;
    }
    .course-arrow {
      padding: 10px 16px;
      font-size: 12px;
      color: #4F8FFF;
      border-top: 1px solid #334155;
    }
  </style>
</head>
<body>
  <header>
    <h1>tech-notes</h1>
    <p>コースを選択してスライドを表示</p>
  </header>
  <div class="grid">

    <a class="course-card" href="slides/kubernetes-foundation/">
      <div class="course-card-body">
        <div class="course-badge">Kubernetes</div>
        <div class="course-title">Kubernetes Foundation</div>
        <div class="course-meta">17 スライドデッキ</div>
      </div>
      <div class="course-arrow">スライド一覧を見る →</div>
    </a>

  </div>
</body>
</html>
